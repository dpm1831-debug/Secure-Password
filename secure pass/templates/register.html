<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecurePass Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/static/register.css">
</head>
<body>

<div id="strength"></div>

<!-- BACK BUTTON -->
<div style="position:absolute; top:15px; left:20px;">
<a href="/">⬅ Back</a>
</div>

<div class="wrapper">

<div class="bg-animation"></div>

<div class="register-card">

<h3 class="logo">🔐 SecurePass</h3>
<p class="subtitle">Create your secure account</p>

<form method="POST" action="/register" id="registerForm">

<input class="input-box" name="name" placeholder="Full Name" required>

<input class="input-box"
id="email"
name="email"
placeholder="Email Address"
onkeyup="verifyEmail()"
required>

<div id="emailMsg"></div>

<input class="input-box" name="country" placeholder="Country">

<input class="input-box" name="phone" placeholder="Phone Number">

<div class="password-field">
<input type="password"
id="password"
name="password"
class="input-box"
placeholder="Password"
onkeyup="checkStrength()">
<span onclick="togglePassword()">👁</span>
</div>

<div id="strength"></div>

<!-- SECURITY ANALYZER OUTPUT -->
<div id="entropy"></div>
<div id="leakCheck"></div>

<button class="register-btn" type="submit">
CREATE ACCOUNT
</button>

</form>

<p class="login-link">
Already registered? <a href="/login">Login</a>
</p>

</div>
</div>

<script src="/static/register.js"></script>

</body>
</html>
